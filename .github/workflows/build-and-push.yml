name: Build and push image to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      # "sha-" prefix matches docker/metadata-action's type=sha tag rule below.
      image_tag_sha: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long

      # This is the slow step (bakes model weights into the image via preload.py at build time,
      # so Cloud Run cold starts never pay for a Hugging Face download) — GitHub-hosted runners
      # cache Docker layers between runs via the GHA cache, so a code-only change is fast.
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image published
        run: echo "Pushed ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }} (and :latest on main)."

# NOTE: this workflow does NOT change the GHCR package's visibility. By default a newly published
# GHCR package inherits the repo's visibility (private repo -> private package). For Cloud Run to
# pull a PRIVATE image it needs registry credentials wired up (Artifact Registry remote-repository
# proxy, or an image-pull secret) — more setup than pulling a public one. See README.md "GHCR
# package visibility" for the tradeoff and the one manual step to make the package public if you
# want the simpler path. This is left as your explicit choice, not automated here.
