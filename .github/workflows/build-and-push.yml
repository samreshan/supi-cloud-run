name: Build and push image to Artifact Registry

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO || 'supi-cloud-run' }}/${{ github.event.repository.name }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for keyless Workload Identity Federation auth to GCP
    steps:
      - name: Check required config is present
        run: |
          missing=()
          [ -z "${{ vars.GCP_PROJECT_ID }}" ] && missing+=("repo variable GCP_PROJECT_ID")
          [ -z "${{ vars.GCP_REGION }}" ] && missing+=("repo variable GCP_REGION")
          [ -z "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ] && missing+=("repo secret GCP_WORKLOAD_IDENTITY_PROVIDER")
          [ -z "${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}" ] && missing+=("repo secret GCP_DEPLOY_SERVICE_ACCOUNT")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required GitHub Actions config: ${missing[*]}. See README.md 'Cloud Run deploy setup'."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long

      # This is the slow step (bakes model weights into the image via preload.py at build time,
      # so Cloud Run cold starts never pay for a Hugging Face download) — GitHub-hosted runners
      # cache Docker layers between runs via the GHA cache, so a code-only change is fast.
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image published
        run: echo "Pushed ${{ env.IMAGE }}:sha-${{ github.sha }} (and :latest on main)."
